name: SoulFire-Bot
on: [workflow_dispatch]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Start Bot
        run: |
          # 1. Create the working directory
          mkdir -p .soulfire
          
          # 2. Copy the prepared settings file from your repo to the bot's folder
          cp configs/settings.json .soulfire/settings.json
          
          # 3. Download the JAR
          curl -L -o bot.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          # 4. Run the bot
          java -Xmx1G -Djava.awt.headless=true -jar bot.jar --config ./.soulfire

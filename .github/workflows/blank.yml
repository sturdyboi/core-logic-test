name: SoulFire 247 Bot Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [ restart_bot ]

jobs:
  run-soulfire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Start SoulFire
        run: |
          mkdir -p .soulfire
          cat << 'EOF' > .soulfire/accounts.json
          [{"username": "SoulBot_247", "type": "offline", "stay_online": true}]
          EOF
          cat << 'EOF' > .soulfire/settings.json
          {
            "server_address": "ahsmpw.falixsrv.me", "server_port": 21987,
            "anti_afk": true, "auto_reconnect": true
          }
          EOF
          
          curl -L -o SoulFireDedicated.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          java -Xmx1G -Djava.awt.headless=true -Dheadlesmc.no-gui=true -jar SoulFireDedicated.jar --config ./.soulfire > bot.log 2>&1 &
          
          echo "Bot started. Waiting 30s to see if it connects..."
          sleep 30
          echo "--- BOT LOG END ---"
          tail -n 50 bot.log
          sleep 350m

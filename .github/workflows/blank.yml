name: SoulFire-Bot
on: [workflow_dispatch]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Initialize and Start Bot
        run: |
          # 1. Create the configuration directory
          mkdir -p .soulfire
          
          # 2. Generate settings.json with your credentials
          cat << 'EOF' > .soulfire/settings.json
          {
            "server_address": "ahsmpw.falixsrv.me",
            "server_port": 21987,
            "admin_email": "root@soulfiremc.com",
            "anti_afk": true,
            "auto_reconnect": true,
            "auto_register": {
              "enabled": true,
              "password": "<afkbot>",
              "register_command": "/register <afkbot> <afkbot>",
              "login_command": "/login <afkbot>"
            }
          }
          EOF
          
          # 3. Download the bot
          curl -L -o bot.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          # 4. Run the bot
          java -Xmx1G -Djava.awt.headless=true -jar bot.jar --config ./.soulfire

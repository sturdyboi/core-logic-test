name: SoulFire 247 Bot Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [ restart_bot ]

jobs:
  soulfire-runner-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Run SoulFire
        run: |
          mkdir -p .soulfire
          cat << 'EOF' > .soulfire/accounts.json
          [{"username": "SoulBot_247", "type": "offline", "stay_online": true}]
          EOF
          cat << 'EOF' > .soulfire/settings.json
          {
            "server_address": "ahsmpw.falixsrv.me", "server_port": 21987,
            "anti_afk": true, "auto_reconnect": true
          }
          EOF
          
          curl -L -o SoulFireDedicated.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          # Run bot and print logs immediately
          java -Xmx1G -Djava.awt.headless=true -Dheadlesmc.no-gui=true -jar SoulFireDedicated.jar --config ./.soulfire &
          
          echo "Bot started. Waiting 30s to initialize connection..."
          sleep 30
          echo "--- FINAL LOG OUTPUT ---"
          tail -n 50 bot.log || echo "Log file not found."
          
          sleep 350m

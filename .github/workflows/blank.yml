name: SoulFire 247 Bot Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [ restart_bot ]

jobs:
  run-soulfire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Create SoulFire Local Environment
        run: |
          mkdir -p .soulfire
          cat << 'EOF' > .soulfire/accounts.json
          [{"username": "SoulBot_247", "type": "offline", "stay_online": true}]
          EOF
          PASSWORD="YourPassword123"
          cat << EOF > .soulfire/settings.json
          {
            "server_address": "ahsmpw.falixsrv.me", "server_port": 21987,
            "anti_afk": true, "auto_reconnect": true, "reconnect_delay": 5000,
            "auto_respawn": true,
            "auto_register": {"enabled": true, "password": "$PASSWORD", "register_command": "/register $PASSWORD $PASSWORD", "login_command": "/login $PASSWORD"}
          }
          EOF

      - name: Start and Configure SoulFire
        run: |
          curl -L -o SoulFireDedicated.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          # Start the bot in the background and pipe output to bot.log
          java -Xmx1G \
            -Djava.awt.headless=true \
            -Dheadlesmc.no-gui=true \
            -Dsf.flags.v2=true \
            -Dsf.rpc.port=38765 \
            -XX:+EnableDynamicAgentLoading -XX:+UnlockExperimentalVMOptions -XX:+UseZGC \
            -XX:+UseCompactObjectHeaders -XX:+AlwaysActAsServerClassMachine -XX:+UseNUMA \
            -XX:+UseFastUnorderedTimeStamps -XX:+UseVectorCmov -XX:+UseCriticalJavaThreadPriority \
            -jar SoulFireDedicated.jar --config ./.soulfire > bot.log 2>&1 &
            
          # Wait loop to ensure the bot is ready before configuring
          echo "Waiting for RPC to initialize..."
          TIMEOUT=60
          COUNTER=0
          until grep -q "RPC Server started" bot.log 2>/dev/null || [ $COUNTER -ge $TIMEOUT ]; do
            sleep 2
            ((COUNTER+=2))
            # Check if process died
            if ! pgrep -f "SoulFireDedicated.jar" > /dev/null; then
              echo "❌ Bot process crashed!"
              cat bot.log
              exit 1
            fi
          done
          
          if [ $COUNTER -ge $TIMEOUT ]; then
            echo "❌ Timeout waiting for RPC."
            cat bot.log
            exit 1
          fi
          
          echo "🔧 Configuring admin email..."
          curl -s -X POST http://127.0.0.1:38765/api/v1/rpc \
            -H "Content-Type: application/json" \
            -d '{"method":"set-email","params":["bot.admin@example.com"]}'
          echo "🚀 Configuration complete."
          
          # Keep the job alive for the requested duration
          sleep 350m

      - name: Restart Loop
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          curl -L -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart_bot"}'

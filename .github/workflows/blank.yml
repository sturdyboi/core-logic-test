name: SoulFire-Bot-V3
on: [workflow_dispatch]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Start Bot
        run: |
          mkdir -p .soulfire
          # Create minimal settings
          echo '{"server_address": "ahsmpw.falixsrv.me", "server_port": 21987}' > .soulfire/settings.json
          
          # Download and run WITHOUT ANY configuration commands
          curl -L -o SoulFire.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          # Run directly. No background (&), no curl, no config steps.
          # This will keep the job running and show you the logs live.
          java -Xmx1G -Djava.awt.headless=true -jar SoulFire.jar --config ./.soulfire

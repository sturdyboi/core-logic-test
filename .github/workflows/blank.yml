name: SoulFire 247 Bot Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [ restart_bot ]

jobs:
  run-soulfire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Create SoulFire Local Environment
        run: |
          mkdir -p .soulfire
          cat << 'EOF' > .soulfire/accounts.json
          [{"username": "SoulBot_247", "type": "offline", "stay_online": true}]
          EOF
          PASSWORD="YourPassword123"
          if [ ! -f "registered.txt" ]; then
            REG_CMD="/register $PASSWORD $PASSWORD"
            echo "registered" > registered.txt
            git config --global user.email "bot@example.com"
            git config --global user.name "BotUpdater"
            git add registered.txt
            git commit -m "Bot registered [skip ci]" || true
            git push || true
          else
            REG_CMD=""
          fi
          cat << EOF > .soulfire/settings.json
          {
            "server_address": "ahsmpw.falixsrv.me", "server_port": 21987,
            "anti_afk": true, "auto_reconnect": true, "reconnect_delay": 5000,
            "auto_respawn": true,
            "auto_register": {"enabled": true, "password": "$PASSWORD", "register_command": "$REG_CMD", "login_command": "/login %password%"}
          }
          EOF

      - name: Start SoulFire Dedicated
        run: |
          curl -L -o SoulFireDedicated.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          # We are grouping all flags directly before the -jar argument
          java -Xmx1G \
            -Djava.awt.headless=true \
            -Dheadlesmc.no-gui=true \
            -Dsf.flags.v2=true \
            -XX:+EnableDynamicAgentLoading -XX:+UnlockExperimentalVMOptions -XX:+UseZGC \
            -XX:+UseCompactObjectHeaders -XX:+AlwaysActAsServerClassMachine -XX:+UseNUMA \
            -XX:+UseFastUnorderedTimeStamps -XX:+UseVectorCmov -XX:+UseCriticalJavaThreadPriority \
            -jar SoulFireDedicated.jar --config ./.soulfire > bot.log 2>&1 &

      - name: Wait for RPC and Configure
        run: |
          echo "Waiting for RPC server to start..."
          count=0
          while ! grep -q "RPC Server started" bot.log; do
            if [ $count -ge 30 ]; then
              echo "❌ ERROR: RPC server failed to start within 60 seconds."
              echo "--- LAST 20 LINES OF BOT LOG ---"
              tail -n 20 bot.log
              exit 1
            fi
            sleep 2
            ((count++))
          done
          echo "🔧 Configuring admin email..."
          curl -X POST http://127.0.0.1:38765/api/v1/rpc \
            -H "Content-Type: application/json" \
            -d '{"method":"set-email","params":["bot.admin@example.com"]}'
          echo "🚀 Bot is active and configured!"

      - name: Keep Alive and Loop
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          sleep 350m
          curl -L -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart_bot"}'

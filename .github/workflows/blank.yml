name: Bot
on: [workflow_dispatch]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Start
        run: |
          mkdir -p .soulfire
          echo '{"server_address": "ahsmpw.falixsrv.me", "server_port": 21987}' > .soulfire/settings.json
          
          curl -L -o bot.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          # This is the exact same way you run it on your PC.
          # No curl, no RPC, no background (&).
          java -Xmx1G -Djava.awt.headless=true -jar bot.jar --config ./.soulfire

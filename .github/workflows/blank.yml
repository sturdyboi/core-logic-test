name: SoulFire 247 Bot Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [ restart_bot ]

jobs:
  run-soulfire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create SoulFire Local Environment
        run: |
          mkdir -p .soulfire
          
          # Setup Account
          cat << 'EOF' > .soulfire/accounts.json
          [
            {
              "username": "SoulBot_247",
              "type": "offline",
              "stay_online": true
            }
          ]
          EOF

          # Login/Register Logic
          PASSWORD="YourPassword123"
          if [ ! -f "registered.txt" ]; then
            REG_CMD="/register $PASSWORD $PASSWORD"
            echo "registered" > registered.txt
            git config --global user.email "bot@example.com"
            git config --global user.name "BotUpdater"
            git add registered.txt
            git commit -m "Bot registered [skip ci]" || true
            git push || true
          else
            REG_CMD=""
          fi

          # Settings File
          cat << EOF > .soulfire/settings.json
          {
            "server_address": "ahsmpw.falixsrv.me",
            "server_port": 21987,
            "anti_afk": true,
            "auto_reconnect": true,
            "reconnect_delay": 5000,
            "auto_respawn": true,
            "auto_register": {
              "enabled": true,
              "password": "$PASSWORD",
              "register_command": "$REG_CMD",
              "login_command": "/login %password%"
            }
          }
          EOF

      - name: Start SoulFire Dedicated
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # Use a direct link to a stable release version instead of 'latest'
          # This avoids the redirect issues causing your 'ASCII text' error
          curl -L -o SoulFireDedicated.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/v1.0.0/SoulFireDedicated.jar
          
          # Debug: Verify the file is an actual JAR
          echo "Checking file type..."
          file SoulFireDedicated.jar
          
          # Only proceed if the file is actually a JAR (Zip archive)
          if file SoulFireDedicated.jar | grep -q "Zip archive"; then
            echo "✅ File verified as JAR. Starting bot..."
            java -Xmx1G -Dterminal.jline=false -jar SoulFireDedicated.jar --config ./.soulfire &
          else
            echo "❌ ERROR: Downloaded file is NOT a valid JAR!"
            cat SoulFireDedicated.jar # This will show you the error message inside the text file
            exit 1
          fi
          
          echo "🚀 Bot is heading to ahsmpw.falixsrv.me:21987"
          sleep 350m
          
          curl -L -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart_bot"}'

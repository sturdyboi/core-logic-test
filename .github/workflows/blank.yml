name: SoulFire 247 Bot Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [ restart_bot ]

jobs:
  run-soulfire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Create SoulFire Local Environment
        run: |
          mkdir -p .soulfire
          cat << 'EOF' > .soulfire/accounts.json
          [{"username": "SoulBot_247", "type": "offline", "stay_online": true}]
          EOF
          PASSWORD="YourPassword123"
          cat << EOF > .soulfire/settings.json
          {
            "server_address": "ahsmpw.falixsrv.me", "server_port": 21987,
            "anti_afk": true, "auto_reconnect": true, "reconnect_delay": 5000,
            "auto_respawn": true,
            "auto_register": {"enabled": true, "password": "$PASSWORD", "register_command": "/register $PASSWORD $PASSWORD", "login_command": "/login $PASSWORD"}
          }
          EOF

      - name: Start SoulFire Dedicated
        run: |
          curl -L -o SoulFireDedicated.jar https://github.com/AlexProgrammerDE/SoulFire/releases/download/2.6.1/SoulFireDedicated-2.6.1.jar
          
          # Start the bot directly in headless mode
          java -Xmx1G \
            -Djava.awt.headless=true \
            -Dheadlesmc.no-gui=true \
            -Dsf.flags.v2=true \
            -Dsf.rpc.port=38765 \
            -XX:+EnableDynamicAgentLoading -XX:+UnlockExperimentalVMOptions -XX:+UseZGC \
            -XX:+UseCompactObjectHeaders -XX:+AlwaysActAsServerClassMachine -XX:+UseNUMA \
            -XX:+UseFastUnorderedTimeStamps -XX:+UseVectorCmov -XX:+UseCriticalJavaThreadPriority \
            -jar SoulFireDedicated.jar --config ./.soulfire > bot.log 2>&1 &
            
          echo "Bot started. Running in background..."
          # Wait for initialization
          sleep 15
          # Display logs for debugging
          echo "--- BOT LOG PREVIEW ---"
          tail -n 30 bot.log
          
          # Keep the job alive
          sleep 350m

      - name: Restart Loop
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          curl -L -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart_bot"}'

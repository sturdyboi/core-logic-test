name: SoulFire AFK Bot

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Bot username (for cracked servers)'
        required: false
        default: 'AFKBot'
      server:
        description: 'Minecraft server address'
        required: false
        default: 'ahsmpw.falixsrv.me'
      password:
        description: 'Password for auto-register and auto-login'
        required: false
        default: 'afkbot123'
      api_username:
        description: 'SoulFire API username (if auth is enabled)'
        required: false
        default: ''
      api_password:
        description: 'SoulFire API password (if auth is enabled)'
        required: false
        default: ''
      duration:
        description: 'Run duration in minutes'
        required: false
        default: '340'
      enable_tunnel:
        description: 'Enable LocalTunnel to expose SoulFire web UI'
        required: false
        default: 'true'
        type: boolean

jobs:
  afk-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Download SoulFire Dedicated JAR
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/AlexProgrammerDE/SoulFire/releases/latest | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4)
          echo "Latest SoulFire version: $VERSION"
          DOWNLOAD_URL="https://github.com/AlexProgrammerDE/SoulFire/releases/download/${VERSION}/SoulFireDedicated-${VERSION}.jar"
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -f -o SoulFireDedicated.jar "$DOWNLOAD_URL"
          if [ ! -f SoulFireDedicated.jar ]; then
            echo "ERROR: Failed to download SoulFireDedicated.jar"
            exit 1
          fi
          FILE_SIZE=$(stat -f%z SoulFireDedicated.jar 2>/dev/null || stat -c%s SoulFireDedicated.jar 2>/dev/null)
          if [ "$FILE_SIZE" -lt 1048576 ]; then
            echo "ERROR: Downloaded file is too small ($FILE_SIZE bytes), likely not a valid JAR"
            exit 1
          fi
          if ! unzip -t SoulFireDedicated.jar >/dev/null 2>&1; then
            echo "ERROR: Downloaded file is not a valid JAR archive"
            exit 1
          fi
          echo "JAR verification successful"
          ls -lh SoulFireDedicated.jar

      - name: Create SoulFire config file
        run: |
          if [ -n "${{ inputs.api_username }}" ] && [ -n "${{ inputs.api_password }}" ]; then
            echo "Creating config with API authentication enabled..."
            cat > config.json << EOF
          {
            "server": {
              "address": "${{ inputs.server }}",
              "port": 25565
            },
            "auth": {
              "onlineMode": false,
              "username": "${{ inputs.username }}"
            },
            "bot": {
              "antiAFK": true,
              "autoReconnect": true,
              "reconnectDelay": 5
            },
            "ui": {
              "headless": false,
              "web": {
                "port": 38765,
                "host": "0.0.0.0",
                "username": "${{ inputs.api_username }}",
                "password": "${{ inputs.api_password }}"
              }
            }
          }
          EOF
          else
            echo "Creating config without API authentication..."
            cat > config.json << 'EOF'
          {
            "server": {
              "address": "${{ inputs.server }}",
              "port": 25565
            },
            "auth": {
              "onlineMode": false,
              "username": "${{ inputs.username }}"
            },
            "bot": {
              "antiAFK": true,
              "autoReconnect": true,
              "reconnectDelay": 5
            },
            "ui": {
              "headless": false,
              "web": {
                "port": 38765,
                "host": "0.0.0.0"
              }
            }
          }
          EOF
          fi
          echo "Config file created:"
          cat config.json

      - name: Create SoulFire plugins config for auto-register/login
        run: |
          mkdir -p plugins/AutoAuth
          cat > plugins/AutoAuth/config.json << 'EOF'
          {
            "enabled": true,
            "autoRegister": true,
            "autoLogin": true,
            "password": "${{ inputs.password }}",
            "registerCommand": "/register %password% %password%",
            "loginCommand": "/login %password%",
            "registerTimeout": 5000,
            "loginTimeout": 5000
          }
          EOF

      - name: Run SoulFire bot
        run: |
          DURATION=${{ inputs.duration }}
          TIMEOUT_SECONDS=$((DURATION * 60))
          echo "Running bot for $DURATION minutes ($TIMEOUT_SECONDS seconds)"
          if [ "${{ inputs.enable_tunnel }}" = "true" ]; then
            echo "Starting LocalTunnel for SoulFire web UI..."
            npx localtunnel --port 38765 > tunnel.log 2>&1 &
            TUNNEL_PID=$!
            echo "LocalTunnel started with PID: $TUNNEL_PID"
            sleep 5
            TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.loca\.lt' tunnel.log | head -n 1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "=========================================="
              echo "🌐 SoulFire Web UI is now accessible at:"
              echo "$TUNNEL_URL"
              echo "=========================================="
              echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            else
              echo "Warning: Could not extract tunnel URL from output"
              cat tunnel.log
            fi
            trap "kill $TUNNEL_PID 2>/dev/null || true" EXIT
          fi
          echo "Starting SoulFire in background..."
          java -jar SoulFireDedicated.jar --config config.json > soulfire.log 2>&1 &
          SOULFIRE_PID=$!
          echo "SoulFire started with PID: $SOULFIRE_PID"
          echo "SOULFIRE_PID=$SOULFIRE_PID" >> $GITHUB_ENV
          trap "kill $SOULFIRE_PID 2>/dev/null || true" EXIT

      - name: Create and start bot instance
        run: |
          sleep 10
          echo "=========================================="
          echo "Checking if SoulFire web UI is ready..."
          echo "=========================================="

          # Set up authentication if credentials are provided
          API_AUTH=""
          if [ -n "${{ inputs.api_username }}" ] && [ -n "${{ inputs.api_password }}" ]; then
            API_AUTH="--user ${{ inputs.api_username }}:${{ inputs.api_password }}"
            echo "Using API authentication with username: ${{ inputs.api_username }}"
          else
            echo "No API credentials provided, attempting unauthenticated access"
          fi

          # Check if the web UI is responding
          for i in {1..30}; do
            echo "Attempt $i: Checking http://localhost:38765..."
            if curl -s $API_AUTH http://localhost:38765 > /dev/null 2>&1; then
              echo "✓ SoulFire web UI is responding!"
              break
            else
              echo "✗ Web UI not responding yet, waiting..."
              if [ $i -eq 30 ]; then
                echo "ERROR: SoulFire web UI did not start after 30 attempts"
                echo "SoulFire log output:"
                cat soulfire.log
                exit 1
              fi
              sleep 2
            fi
          done

          echo ""
          echo "=========================================="
          echo "Getting available API endpoints..."
          echo "=========================================="
          curl -s $API_AUTH -v http://localhost:38765/api/ 2>&1 || echo "Root API endpoint not accessible"

          echo ""
          echo "=========================================="
          echo "Listing existing bot instances..."
          echo "=========================================="
          INSTANCES_RESPONSE=$(curl -s -w "\n%{http_code}" $API_AUTH http://localhost:38765/api/v1/instances 2>&1)
          INSTANCES_HTTP_CODE=$(echo "$INSTANCES_RESPONSE" | tail -n1)
          INSTANCES_BODY=$(echo "$INSTANCES_RESPONSE" | sed '$d')
          echo "HTTP Status: $INSTANCES_HTTP_CODE"
          echo "Response Body: $INSTANCES_BODY"

          echo ""
          echo "=========================================="
          echo "Creating bot instance..."
          echo "=========================================="
          echo "Bot name: AFKBot"
          echo "Server: ${{ inputs.server }}:25565"
          echo "Username: ${{ inputs.username }}"

          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:38765/api/v1/instances \
            -H "Content-Type: application/json" \
            $API_AUTH \
            -d '{
              "name": "AFKBot",
              "serverAddress": "${{ inputs.server }}:25565",
              "username": "${{ inputs.username }}"
            }' 2>&1)
          CREATE_HTTP_CODE=$(echo "$CREATE_RESPONSE" | tail -n1)
          CREATE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
          echo "HTTP Status: $CREATE_HTTP_CODE"
          echo "Response Body: $CREATE_BODY"

          if [ "$CREATE_HTTP_CODE" != "200" ] && [ "$CREATE_HTTP_CODE" != "201" ] && [ "$CREATE_HTTP_CODE" != "204" ]; then
            echo "ERROR: Failed to create bot instance (HTTP $CREATE_HTTP_CODE)"
            echo "Checking if instance already exists..."
            EXISTING_CHECK=$(curl -s -w "\n%{http_code}" $API_AUTH http://localhost:38765/api/v1/instances/AFKBot 2>&1)
            EXISTING_CODE=$(echo "$EXISTING_CHECK" | tail -n1)
            EXISTING_BODY=$(echo "$EXISTING_CHECK" | sed '$d')
            echo "Existing instance check HTTP Status: $EXISTING_CODE"
            echo "Existing instance check Body: $EXISTING_BODY"
            if [ "$EXISTING_CODE" = "200" ]; then
              echo "✓ Bot instance already exists, will try to start it directly"
            else
              echo "✗ Bot instance does not exist and creation failed"
              exit 1
            fi
          else
            echo "✓ Bot instance created successfully"
          fi

          sleep 5
          echo ""
          echo "=========================================="
          echo "Starting bot instance..."
          echo "=========================================="

          START_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:38765/api/v1/instances/AFKBot/start \
            -H "Content-Type: application/json" \
            $API_AUTH 2>&1)
          START_HTTP_CODE=$(echo "$START_RESPONSE" | tail -n1)
          START_BODY=$(echo "$START_RESPONSE" | sed '$d')
          echo "HTTP Status: $START_HTTP_CODE"
          echo "Response Body: $START_BODY"

          if [ "$START_HTTP_CODE" != "200" ] && [ "$START_HTTP_CODE" != "204" ]; then
            echo "ERROR: Failed to start bot instance (HTTP $START_HTTP_CODE)"
            echo "Bot instance details:"
            curl -s $API_AUTH http://localhost:38765/api/v1/instances/AFKBot || echo "Failed to get instance details"
            echo ""
            echo "SoulFire log (last 50 lines):"
            tail -n 50 soulfire.log
            exit 1
          else
            echo "✓ Bot instance started successfully"
          fi

          echo ""
          echo "=========================================="
          echo "Checking bot instance status..."
          echo "=========================================="
          sleep 3
          STATUS_RESPONSE=$(curl -s -w "\n%{http_code}" $API_AUTH http://localhost:38765/api/v1/instances/AFKBot 2>&1)
          STATUS_HTTP_CODE=$(echo "$STATUS_RESPONSE" | tail -n1)
          STATUS_BODY=$(echo "$STATUS_RESPONSE" | sed '$d')
          echo "HTTP Status: $STATUS_HTTP_CODE"
          echo "Response Body: $STATUS_BODY"

          echo ""
          echo "=========================================="
          echo "Bot should now be joining the server..."
          echo "=========================================="
          echo "Waiting 10 seconds for connection..."
          sleep 10

          echo ""
          echo "Checking if bot is connected..."
          tail -n 20 soulfire.log | grep -E "(Connected|Joining|Logged in|Error|Failed)" || echo "No connection status found in recent logs"

          echo ""
          echo "Recent SoulFire log output:"
          tail -n 30 soulfire.log

      - name: Keep bot running
        run: |
          DURATION=${{ inputs.duration }}
          TIMEOUT_SECONDS=$((DURATION * 60))
          echo "Keeping bot running for $DURATION minutes ($TIMEOUT_SECONDS seconds)"
          sleep $TIMEOUT_SECONDS
          echo "Bot ran for $DURATION minutes, triggering next workflow run..."

      - name: Trigger next workflow run
        if: success()
        run: |
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            RUN_ID=${{ github.run_id }}
            REPO=${{ github.repository }}
            echo "Triggering new workflow run for repository: $REPO"
            curl -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/actions/workflows/soulfire-afk.yml/dispatches" \
              -d '{"ref": "${{ github.ref }}", "inputs": {"username": "${{ inputs.username }}", "server": "${{ inputs.server }}", "password": "${{ inputs.password }}", "api_username": "${{ inputs.api_username }}", "api_password": "${{ inputs.api_password }}", "duration": "${{ inputs.duration }}", "enable_tunnel": "${{ inputs.enable_tunnel }}"}}'
            echo "Next workflow triggered successfully"
          else
            echo "No GITHUB_TOKEN available, skipping workflow trigger"
            echo "To enable automatic looping, add a GitHub token with repo scope"
          fi
